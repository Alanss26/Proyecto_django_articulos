{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Lista de Artículos</h2>
    <a href="{% url 'new_article' %}" class="btn btn-success mb-3">Crear Nuevo</a>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for article in articles_list %}
            <tr>
                <td>{{ article.name }}</td>
                <td>
                    <a href="{% url 'article_detail' article.id %}" class="btn btn-sm btn-info">Ver</a>
                    <a href="{% url 'edit_article' article.id %}" class="btn btn-sm btn-warning">Editar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
